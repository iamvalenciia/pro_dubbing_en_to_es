services:
  dubbing:
    build: .
    ports:
      - "7860:7860"
    volumes:
      # Simula el Network Volume de RunPod (modelos HuggingFace ~5 GB)
      - ./runpod-volume:/runpod-volume
      # Datos de trabajo — persisten entre reinicios del contenedor
      - ./cache:/app/cache
      - ./enhance_output:/app/enhance_output
      - ./subtitle_output:/app/subtitle_output
      - ./youtube_video:/app/youtube_video
      - ./archives:/app/archives
      - ./shorts:/app/shorts
    environment:
      - WHISPER_MODEL=base        # usa 'medium' o 'large-v2' en producción
      - TTS_LOCAL_MODEL=Qwen/Qwen3-TTS-12Hz-1.7B-Base
      - TTS_BATCH_SIZE=1          # aumentar a 8 en GPU con ≥24 GB VRAM
      - PYTHONUNBUFFERED=1
    # Requiere NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
